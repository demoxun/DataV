<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataV UMD Example (Vue 3)</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Adjust path if Vite output is different, e.g., datav.global.js or datav.umd.js -->
    <script src="../dist/datav.umd.js"></script>
    <style>
        body { background-color: #282c34; color: white; }
        #app { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px; }
    </style>
</head>
<body>
    <div id="app">
        <h1>DataV Component UMD Test (Vue 3)</h1>
        
        <dv-border-box-1 style="width:300px; height:150px;">
            Border Box 1
        </dv-border-box-1>
        
        <dv-loading style="width:100px; height:100px;">
            Loading...
        </dv-loading>
        
        <dv-full-screen-container style="width: 400px; height: 200px; border: 1px solid grey;">
            <p>Full Screen Container (simulated)</p>
            <p>Content should be centered if component works.</p>
        </dv-full-screen-container>

    </div>

    <script>
        const { createApp } = Vue;
        const app = createApp({
            // Optionally, add some data or methods if needed for more complex tests later
        });

        // Check if DataV is loaded
        if (window.DataV) {
            app.use(window.DataV);
        } else {
            console.error('DataV library not loaded!');
            document.getElementById('app').innerHTML = '<h1 style="color:red;">Error: DataV library not found. Check console.</h1>';
        }
        
        app.mount('#app');
    </script>
</body>
</html>
